<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chúc Mừng Sinh Nhật Hạnh ❤</title>
<meta name="theme-color" content="#0c1f1a">
<meta property="og:title" content="Chúc Mừng Sinh Nhật Hạnh ❤">
<meta property="og:description" content="Một chiếc bánh matcha 3D dành riêng cho em 🎂 — chạm vào nến để thổi và ước theo sao băng nhé!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@500;700&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#081712;touch-action:none}
  body{font-family:'Be Vietnam Pro',sans-serif;color:#ffe9f2;-webkit-user-select:none;user-select:none}
  #stage{position:fixed;inset:0;z-index:0}
  #stage canvas{display:block}

  #vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at 50% 42%, transparent 52%, rgba(8,2,12,.55) 100%)}

  /* ---- Tiêu đề ---- */
  #titleWrap{position:fixed;top:3.2vh;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
  #titleWrap h1{font-family:'Great Vibes',cursive;font-weight:400;
    font-size:clamp(46px,9vw,96px);line-height:1.1;color:#eafbea;
    text-shadow:0 0 18px rgba(140,225,170,.7),0 0 60px rgba(90,205,140,.4);
    animation:glowPulse 3.2s ease-in-out infinite}
  #tenNguoiYeu{font-family:'Dancing Script',cursive;font-size:clamp(20px,4vw,34px);
    color:#ffe3a3;letter-spacing:.06em;margin-top:.1em;
    text-shadow:0 0 14px rgba(255,200,110,.55)}
  @keyframes glowPulse{
    0%,100%{text-shadow:0 0 18px rgba(140,225,170,.7),0 0 60px rgba(90,205,140,.4)}
    50%{text-shadow:0 0 26px rgba(170,240,195,.95),0 0 84px rgba(100,215,150,.55)}
  }

  /* ---- Gợi ý ---- */
  #hint{position:fixed;bottom:86px;left:0;right:0;text-align:center;z-index:5;pointer-events:none;
    font-size:14px;font-weight:300;color:rgba(255,233,242,.85);
    text-shadow:0 1px 8px rgba(0,0,0,.6);transition:opacity 1.2s}
  #hint.hide{opacity:0}

  /* ---- Nút điều khiển ---- */
  #controls{position:fixed;bottom:18px;left:0;right:0;z-index:10;
    display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:0 12px}
  .btn{font-family:'Be Vietnam Pro',sans-serif;font-size:14px;color:#ffe9f2;
    background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.28);
    border-radius:999px;padding:10px 18px;cursor:pointer;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transition:background .25s,transform .15s;white-space:nowrap}
  .btn:hover{background:rgba(255,255,255,.18)}
  .btn:active{transform:scale(.95)}
  .btn.accent{background:rgba(105,195,135,.30);border-color:rgba(150,225,175,.6)}
  .btn.accent:hover{background:rgba(105,195,135,.45)}

  /* ---- Lời chúc khi thổi hết nến ---- */
  #wishOverlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:20px;
    pointer-events:none;opacity:0;transition:opacity 1.6s ease}
  #wishOverlay.show{opacity:1}
  #wishOverlay .big{font-family:'Great Vibes',cursive;font-size:clamp(40px,8vw,84px);
    color:#eafff0;text-shadow:0 0 24px rgba(140,230,175,.9),0 0 90px rgba(90,210,145,.55);
    line-height:1.15}
  #wishOverlay .sub{font-family:'Dancing Script',cursive;font-size:clamp(20px,4vw,32px);
    color:#ffe3a3;margin-top:14px;text-shadow:0 0 16px rgba(255,200,110,.6)}
  #relightBtn{margin-top:26px;pointer-events:auto;display:none}
  #wishOverlay.show #relightBtn{display:inline-block}

  /* ---- Thiệp ---- */
  #letterModal{position:fixed;inset:0;z-index:30;display:none;
    align-items:center;justify-content:center;background:rgba(10,3,16,.62);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:16px}
  #letterModal.open{display:flex}
  #letterCard{position:relative;width:min(520px,94vw);max-height:82vh;overflow-y:auto;
    background:linear-gradient(160deg,#fbfff4,#ecf8ec);border-radius:18px;
    padding:34px 30px 30px;color:#2f4a38;
    box-shadow:0 18px 70px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.35) inset}
  #letterCard h2{font-family:'Great Vibes',cursive;font-weight:400;
    font-size:clamp(32px,6vw,44px);color:#3f7d54;text-align:center;margin-bottom:14px}
  #letterBody{font-size:15.5px;line-height:1.85;font-weight:300;min-height:120px;white-space:pre-wrap}
  #letterBody b{font-weight:600}
  #letterSign{margin-top:18px;text-align:right;font-family:'Dancing Script',cursive;
    font-size:22px;color:#3f7d54}
  #letterClose{position:absolute;top:10px;right:14px;border:none;background:none;
    font-size:26px;color:#7a9;cursor:pointer;line-height:1}
  .cursorBar{display:inline-block;width:2px;height:1em;background:#3f7d54;
    vertical-align:-0.15em;animation:blink .8s step-end infinite}
  @keyframes blink{50%{opacity:0}}

  /* ---- Màn hình chờ ---- */
  #loader{position:fixed;inset:0;z-index:50;background:#081712;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity 1s ease}
  #loader.hide{opacity:0;pointer-events:none}
  #loader .heart{font-size:54px;animation:beat 1s ease-in-out infinite}
  #loader p{margin-top:16px;font-weight:300;color:#b8e8c8;letter-spacing:.1em;font-size:14px}
  @keyframes beat{0%,100%{transform:scale(1)}30%{transform:scale(1.25)}60%{transform:scale(1.05)}}
</style>
</head>
<body>

<div id="stage"></div>
<div id="vignette"></div>

<div id="titleWrap">
  <h1>Happy Birthday</h1>
  <div id="tenNguoiYeu">♥ Hạnh ♥</div>
</div>

<div id="hint">Kéo để xoay chiếc bánh &nbsp;•&nbsp; Chạm vào ngọn nến để thổi 💨</div>

<div id="controls">
  <button class="btn" id="musicBtn">🔊 Nhạc: Bật</button>
  <button class="btn accent" id="blowBtn">💨 Thổi nến &amp; ước</button>
  <button class="btn" id="letterBtn">💌 Mở thiệp</button>
</div>

<div id="wishOverlay">
  <div class="big" id="wishBig">Chúc mừng sinh nhật!</div>
  <div class="sub">Điều em vừa ước, nhất định sẽ thành hiện thực ❤</div>
  <button class="btn accent" id="relightBtn">🕯 Thắp nến lại</button>
</div>

<div id="letterModal">
  <div id="letterCard">
    <button id="letterClose" aria-label="Đóng">✕</button>
    <h2 id="letterTitle">Gửi Em ❤</h2>
    <div id="letterBody"></div>
    <div id="letterSign">— Người luôn yêu em ❤</div>
  </div>
</div>

<div id="loader">
  <div class="heart">🍵</div>
  <p>Đang pha matcha &amp; thắp nến chờ em...</p>
</div>

<script>
/* ============================================================
   CHỈNH SỬA MÓN QUÀ CỦA BẠN Ở ĐÂY 💝
   - ten    : tên người ấy (hoặc mở link kèm ?ten=TênNgườiẤy)
   - soNen  : số ngọn nến trên bánh, 1–12 (hoặc ?nen=7)
   - loiChuc: các dòng chữ trong tấm thiệp
   ============================================================ */
window.CAKE_CONFIG = {
  ten: "Hạnh",
  soNen: 7,
  loiChuc: [
    "Chúc mừng sinh nhật Hạnh — người con gái anh thương nhất trên đời.",
    "Cảm ơn em đã đến bên anh, và làm những ngày bình thường nhất cũng trở nên lấp lánh.",
    "Anh chọn bánh matcha — vị ngọt dịu dàng, giống hệt cách em làm cuộc sống của anh dịu lại.",
    "Tuổi mới, anh mong em thật khỏe mạnh, cười thật nhiều, và mọi điều ước đều thành sự thật.",
    "Nếu em thấy sao băng bay qua, hãy nhắm mắt ước một điều nhé — anh sẽ cùng em thực hiện nó.",
    "Yêu em nhiều lắm ❤"
  ],
  kyTen: "— Người luôn yêu em ❤"
};
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ------------------ Cấu hình ------------------ */
const CFG = window.CAKE_CONFIG;
const params = new URLSearchParams(location.search);
const TEN = (params.get('ten') || CFG.ten).trim();
const SO_NEN = Math.min(12, Math.max(1, parseInt(params.get('nen')) || CFG.soNen));

document.getElementById('tenNguoiYeu').textContent = '♥ ' + TEN + ' ♥';
document.getElementById('wishBig').textContent = 'Chúc mừng sinh nhật, ' + TEN + '!';
document.getElementById('letterTitle').textContent = 'Gửi ' + TEN + ' ❤';
document.getElementById('letterSign').textContent = CFG.kyTen;
document.title = 'Chúc Mừng Sinh Nhật ' + TEN + ' ❤';

/* ------------------ Khung cảnh ------------------ */
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
{
  const c = document.createElement('canvas'); c.width = 2; c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#153529');
  grad.addColorStop(0.55, '#0c211a');
  grad.addColorStop(1, '#04100b');
  g.fillStyle = grad; g.fillRect(0, 0, 2, 512);
  const bg = new THREE.CanvasTexture(c);
  bg.colorSpace = THREE.SRGBColorSpace;
  scene.background = bg;
}
scene.fog = new THREE.Fog(0x0c211a, 26, 58);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(9.3, 7.1, 11.9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3.1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minDistance = 6;
controls.maxDistance = 22;
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = 1.45;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.8;

/* ------------------ Ánh sáng ------------------ */
scene.add(new THREE.HemisphereLight(0xe4ffe9, 0x0e241a, 0.8));

const keyLight = new THREE.DirectionalLight(0xfff0dd, 2.4);
keyLight.position.set(6, 11, 7);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -8; keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 10; keyLight.shadow.camera.bottom = -4;
keyLight.shadow.camera.far = 40;
keyLight.shadow.bias = -0.0006;
scene.add(keyLight);

const rimMint = new THREE.PointLight(0x53e0a8, 32, 45, 2); rimMint.position.set(-8, 5, -6); scene.add(rimMint);
const rimBlue = new THREE.PointLight(0x5b8cff, 28, 45, 2); rimBlue.position.set(8, 4, -8); scene.add(rimBlue);

const candleLight = new THREE.PointLight(0xffb45e, 0, 13, 2);
scene.add(candleLight);

/* ------------------ Chất liệu & texture tự vẽ ------------------ */
function canvasTexture(size, draw) {
  const c = document.createElement('canvas'); c.width = c.height = size;
  draw(c.getContext('2d'), size);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// Mặt bàn nhung xanh rêu sẫm
const tableTex = canvasTexture(512, (g, s) => {
  const grad = g.createRadialGradient(s/2, s/2, s*0.05, s/2, s/2, s*0.55);
  grad.addColorStop(0, '#2e4d3d');
  grad.addColorStop(0.6, '#1b3226');
  grad.addColorStop(1, '#0e1a12');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  g.globalAlpha = 0.05;
  for (let i = 0; i < 900; i++) {
    g.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000';
    g.fillRect(Math.random()*s, Math.random()*s, 1.6, 1.6);
  }
});

// Sọc xoắn cho nến
function stripeTex(colA, colB) {
  const t = canvasTexture(128, (g, s) => {
    g.fillStyle = colA; g.fillRect(0, 0, s, s);
    g.save(); g.translate(s/2, s/2); g.rotate(Math.PI/4); g.fillStyle = colB;
    for (let x = -s*1.5; x < s*1.5; x += 32) g.fillRect(x, -s, 16, s*2);
    g.restore();
  });
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(3, 1.5);
  return t;
}

// Vỏ dâu tây có hạt
const strawberryTex = canvasTexture(128, (g, s) => {
  g.fillStyle = '#e73249'; g.fillRect(0, 0, s, s);
  g.fillStyle = '#ffd9a0';
  for (let y = 0; y < 6; y++) for (let x = 0; x < 8; x++) {
    const px = (x + (y%2 ? 0.5 : 0)) * s/8 + (Math.random()-0.5)*4;
    const py = y * s/6 + 8 + (Math.random()-0.5)*4;
    g.beginPath(); g.ellipse(px, py, 2, 3.2, 0, 0, Math.PI*2); g.fill();
  }
});

// Kem lấm tấm bột matcha (hoặc vani) — nhìn như bánh thật
function speckleTex(base, dot) {
  const t = canvasTexture(256, (g, s) => {
    g.fillStyle = base; g.fillRect(0, 0, s, s);
    g.fillStyle = dot;
    for (let i = 0; i < 150; i++) {
      g.globalAlpha = 0.12 + Math.random() * 0.3;
      g.beginPath();
      g.arc(Math.random()*s, Math.random()*s, 0.8 + Math.random()*2.1, 0, Math.PI*2);
      g.fill();
    }
    g.globalAlpha = 1;
  });
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

// Đốm sáng tròn (hạt bokeh / lửa / khói)
function glowSpriteTex(inner, outer) {
  const t = canvasTexture(64, (g, s) => {
    const grad = g.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    grad.addColorStop(0, inner);
    grad.addColorStop(1, outer);
    g.fillStyle = grad; g.fillRect(0, 0, s, s);
  });
  return t;
}
const softDotTex   = glowSpriteTex('rgba(255,255,255,1)', 'rgba(255,255,255,0)');
const flameGlowTex = glowSpriteTex('rgba(255,190,90,0.95)', 'rgba(255,120,30,0)');
const smokeTex     = glowSpriteTex('rgba(200,200,210,0.55)', 'rgba(200,200,210,0)');

const goldMat = new THREE.MeshStandardMaterial({ color: 0xecb64f, metalness: 0.88, roughness: 0.26 });
const pearlMat = new THREE.MeshStandardMaterial({ color: 0xf6d488, metalness: 0.8, roughness: 0.3 });

/* ------------------ Bàn tiệc ------------------ */
const table = new THREE.Mesh(
  new THREE.CylinderGeometry(27, 27, 0.5, 64),
  new THREE.MeshStandardMaterial({ map: tableTex, roughness: 0.92 })
);
table.position.y = -0.25;
table.receiveShadow = true;
scene.add(table);

/* ------------------ Kệ bánh vàng ------------------ */
const cake = new THREE.Group();
scene.add(cake);

function addGold(geo, y) {
  const m = new THREE.Mesh(geo, goldMat);
  m.position.y = y; m.castShadow = true; m.receiveShadow = true;
  cake.add(m); return m;
}
addGold(new THREE.CylinderGeometry(1.75, 2.05, 0.24, 48), 0.12);         // chân đế
addGold(new THREE.CylinderGeometry(0.4, 0.55, 0.82, 32), 0.24 + 0.41);   // thân trụ
addGold(new THREE.CylinderGeometry(4.2, 4.2, 0.16, 72), 1.07 + 0.08);    // mâm bánh
// viền hạt vàng quanh mâm
for (let i = 0; i < 40; i++) {
  const a = i / 40 * Math.PI * 2;
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), goldMat);
  b.position.set(Math.sin(a)*4.15, 1.19, Math.cos(a)*4.15);
  b.castShadow = true;
  cake.add(b);
}
// dây đèn ấm rủ quanh mép mâm, nhấp nháy dịu
const bulbMats = [0xffd98c, 0xbff2c8, 0xfff4e0].map(c =>
  new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.9 }));
{
  const bulbGeo = new THREE.SphereGeometry(0.055, 8, 8);
  const swags = 12;
  let bi = 0;
  for (let s = 0; s < swags; s++) {
    const a0 = s / swags * Math.PI * 2, a1 = (s + 1) / swags * Math.PI * 2;
    for (let k = 1; k <= 6; k++) {
      const f = k / 7;
      const a = a0 + (a1 - a0) * f;
      const b = new THREE.Mesh(bulbGeo, bulbMats[bi++ % 3]);
      b.position.set(Math.sin(a) * 4.34, 1.14 - 0.38 * Math.sin(Math.PI * f), Math.cos(a) * 4.34);
      cake.add(b);
    }
  }
}
const BASE_Y = 1.23; // mặt trên của mâm

/* ------------------ Các tầng bánh & kem chảy ------------------ */
function makeTier(radius, height, yBottom, bodyCol, bodyDot, dripCol, dripDot) {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ map: speckleTex(bodyCol, bodyDot), roughness: 0.52 });
  const dripMat = new THREE.MeshStandardMaterial({ map: speckleTex(dripCol, dripDot), roughness: 0.38 });

  const body = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius*1.02, height, 64), bodyMat);
  body.position.y = yBottom + height/2;
  body.castShadow = body.receiveShadow = true;
  g.add(body);

  const topY = yBottom + height;

  // lớp kem phủ mặt trên
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(radius+0.06, radius+0.06, 0.12, 64), dripMat);
  cap.position.y = topY - 0.02;
  cap.castShadow = cap.receiveShadow = true;
  g.add(cap);

  // gờ kem tràn mép
  const lip = new THREE.Mesh(new THREE.TorusGeometry(radius+0.02, 0.09, 12, 64), dripMat);
  lip.rotation.x = Math.PI/2;
  lip.position.y = topY - 0.06;
  lip.castShadow = true;
  g.add(lip);

  // các giọt kem chảy dọc thân
  const nDrip = Math.round(radius * 9);
  for (let i = 0; i < nDrip; i++) {
    const a = i / nDrip * Math.PI * 2 + (Math.random()-0.5) * 0.18;
    const len = 0.18 + Math.random() * 0.48;
    const d = new THREE.Mesh(new THREE.CapsuleGeometry(0.075, len, 4, 10), dripMat);
    d.position.set(Math.sin(a)*(radius+0.035), topY - 0.1 - len/2, Math.cos(a)*(radius+0.035));
    d.castShadow = true;
    g.add(d);
  }

  // chuỗi hạt trân châu quanh chân tầng
  const nP = Math.round(radius * 11);
  for (let i = 0; i < nP; i++) {
    const a = i / nP * Math.PI * 2;
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), pearlMat);
    p.position.set(Math.sin(a)*(radius+0.02), yBottom + 0.09, Math.cos(a)*(radius+0.02));
    p.castShadow = true;
    g.add(p);
  }

  cake.add(g);
  return topY;
}

const TOP1 = makeTier(2.9, 1.55, BASE_Y, '#fdf8ec', '#e6dcc0', '#8db474', '#5f8a4b');
const TOP2 = makeTier(2.15, 1.45, TOP1, '#cbe0af', '#a5bf82', '#fffdf6', '#e6dfc9');
const TOP3 = makeTier(1.45, 1.35, TOP2, '#fdf8ec', '#e6dcc0', '#729f5b', '#4e7440');

/* ------------------ Kem tươi xoáy ------------------ */
function creamDollop(scale, color = 0xfffdf7) {
  const pts = [];
  for (let i = 0; i <= 24; i++) {
    const t = i / 24;
    const r = 0.3 * (1 - t*t*0.95) * (1 + 0.13*Math.sin(t*14));
    pts.push(new THREE.Vector2(Math.max(r, 0.004), t * 0.52));
  }

function heartShapeGeo(depth) {
  const x = 0, y = 0;
  const sh = new THREE.Shape();
  sh.moveTo(x + 5, y + 5);
  sh.bezierCurveTo(x + 5, y + 5, x + 4, y, x, y);
  sh.bezierCurveTo(x - 6, y, x - 6, y + 7, x - 6, y + 7);
  sh.bezierCurveTo(x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19);
  sh.bezierCurveTo(x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7);
  sh.bezierCurveTo(x + 16, y + 7, x + 16, y, x + 10, y);
  sh.bezierCurveTo(x + 7, y, x + 5, y + 5, x + 5, y + 5);
  const geo = new THREE.ExtrudeGeometry(sh, { depth, bevelEnabled: true, bevelSize: 0.6, bevelThickness: 0.6, bevelSegments: 3 });
  geo.center();
  geo.rotateZ(Math.PI);
  return geo;
}

function makeBokeh(count, size, colorsList) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const c = new THREE.Color();
  for (let i = 0; i < count; i++) {
    const r = 7 + Math.random() * 20;
    const a = Math.random() * Math.PI * 2;
    pos[i*3] = Math.sin(a) * r;
    pos[i*3+1] = Math.random() * 13;
    pos[i*3+2] = Math.cos(a) * r;
    c.set(colorsList[i % colorsList.length]);
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size, map: softDotTex, vertexColors: true, transparent: true, opacity: 0.75,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true
  });
  const p = new THREE.Points(geo, mat);
  scene.add(p);
  return p;
}

  ['G4',.75],['G4',.25],['A4',1],['G4',1],['C5',1],['B4',2],
  ['G4',.75],['G4',.25],['A4',1],['G4',1],['D5',1],['C5',2],
  ['G4',.75],['G4',.25],['G5',1],['E5',1],['C5',1],['B4',1],['A4',2],
  ['F5',.75],['F5',.25],['E5',1],['C5',1],['D5',1],['C5',2],['R',2]
];
// bè trầm rải hợp âm, tổng số phách khớp với giai điệu (27 phách)
const BASSLINE = [
  ['C3',3],['C3',3],
  ['G2',3],['C3',3],
  ['C3',3],['C3',3],['F2',1],
  ['F2',2],['G2',2],['C3',2],['R',2]
];
function initAudio() {
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  actx = new AC();
  master = actx.createGain(); master.gain.value = 0.85;
  master.connect(actx.destination);
  // delay tạo cảm giác hộp nhạc vang nhẹ
  const delay = actx.createDelay(1); delay.delayTime.value = 0.31;
  const fb = actx.createGain(); fb.gain.value = 0.34;
  const wet = actx.createGain(); wet.gain.value = 0.4;
  delaySend = actx.createGain(); delaySend.gain.value = 1;
  delaySend.connect(delay); delay.connect(fb); fb.connect(delay);
  delay.connect(wet); wet.connect(master);
}
function mbNote(f, t, dur, vol) {
  const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
  const g = actx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master); g.connect(delaySend);
  o.start(t); o.stop(t + dur + 0.05);
  const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 4;
  const g2 = actx.createGain();
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(vol * 0.09, t + 0.008);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.35);
  o2.connect(g2); g2.connect(master);
  o2.start(t); o2.stop(t + dur * 0.4 + 0.05);
}
function musicTick() {
  if (!musicOn) return;
  while (mNext < actx.currentTime + 0.5) {
    const [n, d] = MELODY[mIdx];
    if (n !== 'R') {
      mbNote(nFreq(n), mNext, 1.7, 0.2);
      mbNote(nFreq(n) * 2, mNext, 1.2, 0.045);
    }
    mNext += d * BEAT;
    mIdx = (mIdx + 1) % MELODY.length;
  }
  while (bNext < actx.currentTime + 0.5) {
    const [n, d] = BASSLINE[bIdx];
    if (n !== 'R') {
      const f = nFreq(n);
      mbNote(f, bNext, 2.4, 0.1);
      mbNote(f * 1.5, bNext + BEAT * 0.5, 1.8, 0.05);
      mbNote(f * 2, bNext + BEAT, 1.6, 0.045);
    }
    bNext += d * BEAT;
    bIdx = (bIdx + 1) % BASSLINE.length;
  }
  musicTimer = setTimeout(musicTick, 200);
}
function startMusic() {
  initAudio();
  musicOn = true;
  mIdx = 0; bIdx = 0;
  mNext = bNext = actx.currentTime + 0.12;
  musicTick();
  musicBtn.textContent = '🔊 Nhạc: Bật';
}
function stopMusic() {
  musicOn = false;
  clearTimeout(musicTimer);
  musicBtn.textContent = '🔇 Nhạc: Tắt';
}
function puffSound() {
  if (!actx) return;
  const dur = 0.28;
  const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 650; bp.Q.value = 0.8;
  const g = actx.createGain();
  const t = actx.currentTime;
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(t);
}
function fanfare() {
  if (!actx) return;
  const t0 = actx.currentTime + 0.05;
  ['C5','E5','G5','C6','E6'].forEach((n, i) => mbNote(nFreq(n), t0 + i * 0.09, 1.8, 0.22));
  mbNote(nFreq('G5'), t0 + 0.55, 2.2, 0.16);
  mbNote(nFreq('C6'), t0 + 0.55, 2.2, 0.16);
}

/* ------------------ Hậu kỳ: bloom ------------------ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.55, 0.65, 0.82);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ------------------ Tương tác ------------------ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downX = 0, downY = 0;
let firstGestureDone = false;

const musicBtn = document.getElementById('musicBtn');
const hintEl = document.getElementById('hint');
const wishOverlay = document.getElementById('wishOverlay');

function firstGesture() {
  if (firstGestureDone) return;
  firstGestureDone = true;
  startMusic(); // nhạc tự cất lên ở lần chạm đầu tiên
}
window.addEventListener('pointerdown', e => {
  firstGesture();
  downX = e.clientX; downY = e.clientY;
});
window.addEventListener('pointerup', e => {
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 7) return;
  if (e.target.closest('#controls,#letterModal,#wishOverlay')) return;
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(clickables, false);
  if (hits.length) {
    const ci = hits[0].object.userData.ci;
    if (ci !== undefined && candles[ci].lit) blowOut(ci);
  }
});

function blowOut(ci) {
  const c = candles[ci];
  if (!c.lit) return;
  c.lit = false;
  initAudio(); puffSound();
  const wp = new THREE.Vector3();
  c.flame.getWorldPosition(wp);
  spawnSmoke(wp);
  hintEl.classList.add('hide');
  if (candles.every(k => !k.lit)) setTimeout(celebrate, 550);
}

function celebrate() {
  burstConfetti();
  fanfare();
  sparkleUntil = tSim + 8;   // topper tim phun pháo bông
  launchShootingStar();      // sao băng bay qua — ước nhanh nhé!
  wishOverlay.classList.add('show');
}

document.getElementById('blowBtn').addEventListener('click', () => {
  const lit = candles.map((c, i) => c.lit ? i : -1).filter(i => i >= 0);
  lit.forEach((ci, k) => setTimeout(() => blowOut(ci), k * 140));
});

document.getElementById('relightBtn').addEventListener('click', () => {
  wishOverlay.classList.remove('show');
  confetti.active = false;
  confetti.mesh.visible = false;
  candles.forEach(c => { c.lit = true; });
});

musicBtn.addEventListener('click', () => {
  firstGestureDone = true; // tránh auto-start đè lên lựa chọn
  if (musicOn) stopMusic(); else startMusic();
});

/* ---- Thiệp ---- */
const letterModal = document.getElementById('letterModal');
const letterBody = document.getElementById('letterBody');
let typingTimer = null;
document.getElementById('letterBtn').addEventListener('click', () => {
  letterModal.classList.add('open');
  typeLetter();
});
document.getElementById('letterClose').addEventListener('click', () => {
  letterModal.classList.remove('open');
  clearTimeout(typingTimer);
});
function typeLetter() {
  clearTimeout(typingTimer);
  const fullText = CFG.loiChuc.join('\n\n');
  let i = 0;
  letterBody.innerHTML = '<span class="cursorBar"></span>';
  function step() {
    i += 1 + (Math.random() < 0.3 ? 1 : 0);
    if (i >= fullText.length) {
      letterBody.textContent = fullText;
      return;
    }
    letterBody.innerHTML = fullText.slice(0, i).replace(/\n/g, '<br>') + '<span class="cursorBar"></span>';
    typingTimer = setTimeout(step, 26);
  }
  step();
}

setTimeout(() => hintEl.classList.add('hide'), 9000);

/* ------------------ Vòng lặp ------------------ */
const clock = new THREE.Clock();
let loaderHidden = false;
let lightNow = 0;
let tSim = 0;
const tmpQ = new THREE.Quaternion();
const tmpM = new THREE.Matrix4();
const tmpS = new THREE.Vector3(1, 1, 1);

function tick(dt) {
  tSim += dt;
  const t = tSim;

  controls.update();

  // ngọn lửa lung linh
  let litCount = 0;
  for (const c of candles) {
    const target = c.lit ? 1 : 0;
    c.fs += (target - c.fs) * Math.min(1, dt * 9);
    if (c.lit) litCount++;
    const flick = 1 + 0.15 * Math.sin(t * 13 + c.phase) + 0.07 * Math.sin(t * 29 + c.phase * 2.3);
    c.flame.scale.set(c.fs, Math.max(0.001, c.fs * flick), c.fs);
    c.flame.position.x = 0.012 * Math.sin(t * 7 + c.phase);
    c.flame.position.z = 0.012 * Math.cos(t * 6.3 + c.phase);
    c.glowMat.opacity = 0.85 * c.fs;
  }
  const lightTarget = litCount > 0 ? (20 + litCount * 2) * (1 + 0.13 * Math.sin(t * 11)) : 0;
  lightNow += (lightTarget - lightNow) * Math.min(1, dt * 6);
  candleLight.intensity = lightNow;

  // topper tim xoay nhẹ
  if (window.__topper) window.__topper.rotation.y = t * 0.8;

  // bokeh
  bokehA.rotation.y = t * 0.02;
  bokehB.rotation.y = -t * 0.03;

  // tim bay
  for (const h of floatHearts) {
    h.mesh.position.y += h.sp * dt;
    h.mesh.rotation.y += h.rs * dt;
    h.mesh.position.x += Math.sin(t * 0.6 + h.ph) * dt * 0.3;
    if (h.mesh.position.y > 11) h.mesh.position.y = 0.2;
  }

  // cánh hoa rơi
  for (const p of petals) {
    p.mesh.position.y -= p.sp * dt;
    p.mesh.position.x += Math.sin(t * 1.4 + p.ph) * dt * 0.5;
    p.mesh.rotation.x += p.rx * dt;
    p.mesh.rotation.z += p.rz * dt;
    if (p.mesh.position.y < 0.05) {
      p.mesh.position.y = 10 + Math.random() * 2;
      const r = 3 + Math.random() * 11, a = Math.random() * Math.PI * 2;
      p.mesh.position.x = Math.sin(a) * r;
      p.mesh.position.z = Math.cos(a) * r;
    }
  }

  // pháo giấy
  if (confetti.active) {
    confetti.time += dt;
    for (let i = 0; i < CONF_N; i++) {
      const p = confetti.pos[i], v = confetti.vel[i];
      v.y -= 6.5 * dt;
      p.addScaledVector(v, dt);
      if (p.y < 0.05) { p.y = 0.05; v.set(0, 0, 0); }
      const e = confetti.eul[i];
      e.x += confetti.rs[i].x * dt;
      e.z += confetti.rs[i].z * dt;
      tmpQ.setFromEuler(e);
      tmpM.compose(p, tmpQ, tmpS);
      confetti.mesh.setMatrixAt(i, tmpM);
    }
    confetti.mesh.instanceMatrix.needsUpdate = true;
    if (confetti.time > 10) { confetti.active = false; confetti.mesh.visible = false; }
  }

  // khói
  for (let i = smokes.length - 1; i >= 0; i--) {
    const s = smokes[i];
    s.t += dt;
    const k = s.t / s.life;
    if (k >= 1) {
      scene.remove(s.spr);
      s.spr.material.dispose();
      smokes.splice(i, 1);
      continue;
    }
    s.spr.position.addScaledVector(s.vel, dt);
    s.spr.scale.setScalar(0.14 + k * 0.5);
    s.spr.material.opacity = 0.4 * (1 - k);
  }

  // dây đèn nhấp nháy dịu
  bulbMats.forEach((m, i) => { m.opacity = 0.72 + 0.28 * Math.sin(t * 2.1 + i * 2.4); });

  // đom đóm lượn quanh, lập lòe
  for (const f of fireflies) {
    const a = f.a0 + t * f.av;
    f.spr.position.set(Math.sin(a) * f.r, f.h + Math.sin(t * f.vs + f.ph) * 0.8, Math.cos(a) * f.r);
    f.spr.material.opacity = 0.22 + 0.6 * Math.abs(Math.sin(t * 1.7 + f.ph));
  }

  // sao băng thỉnh thoảng lướt qua trời
  if (t > nextStarAt && !shootingStar) {
    launchShootingStar();
    nextStarAt = t + 9 + Math.random() * 9;
  }
  if (shootingStar) {
    const st = shootingStar;
    st.t += dt;
    st.pos.addScaledVector(st.vel, dt);
    for (let i = 0; i < 2; i++) {
      spawnSpark(
        st.pos.clone().add(new THREE.Vector3((Math.random()-0.5)*0.15, (Math.random()-0.5)*0.15, 0)),
        new THREE.Vector3(0, 0.3, 0), 0.7, 0.3 + Math.random() * 0.25, 0xfff6d8, 0);
    }
    if (st.t > st.life) shootingStar = null;
  }

  // pháo bông tóe ra từ topper tim khi thổi hết nến
  if (t < sparkleUntil) {
    for (let i = 0; i < 8; i++) {
      const v = new THREE.Vector3((Math.random()-0.5)*3.2, 1.8 + Math.random()*3.6, (Math.random()-0.5)*3.2);
      spawnSpark(new THREE.Vector3(0, TOP3 + 2.15, 0), v, 0.5 + Math.random() * 0.5, 0.17,
        Math.random() < 0.35 ? 0xffffff : 0xffd98c, 2.5);
    }
  }

  // cập nhật mọi hạt sáng
  for (let i = sparks.length - 1; i >= 0; i--) {
    const p = sparks[i];
    p.t += dt;
    const k = p.t / p.life;
    if (k >= 1) {
      scene.remove(p.spr);
      p.spr.material.dispose();
      sparks.splice(i, 1);
      continue;
    }
    p.vel.y -= p.grav * dt;
    p.spr.position.addScaledVector(p.vel, dt);
    p.spr.material.opacity = 0.9 * (1 - k);
  }

  composer.render();
}

function animate() {
  requestAnimationFrame(animate);
  tick(Math.min(clock.getDelta(), 0.05));
  if (!loaderHidden) {
    loaderHidden = true;
    document.getElementById('loader').classList.add('hide');
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// hook kiểm thử headless (không ảnh hưởng người xem)
window.__debug = {
  snap(w = 800, h = 450) {
    renderer.setSize(w, h);
    composer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    composer.render();
    const url = renderer.domElement.toDataURL('image/jpeg', 0.85);
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    return url;
  },
  blowAll() { candles.forEach((c, i) => blowOut(i)); },
  step(n = 60, dt = 1 / 60) { for (let i = 0; i < n; i++) tick(dt); },
  cam() { return { pos: camera.position.toArray().map(v => +v.toFixed(2)), fov: camera.fov, aspect: +camera.aspect.toFixed(3) }; },
  stats() { return { sparks: sparks.length, tSim: +tSim.toFixed(2), sparkleUntil: +sparkleUntil.toFixed(2), confettiOn: confetti.active, smokes: smokes.length }; },
  candles
};
</script>
